<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ .Title }} | Tri-Cities IT Support</title>

    <meta name="description" content="
    {{ if eq .Title "About" }}
    Learn about Tri-Cities IT Support, providing practical IT support, Microsoft 365 assistance, networking, WiFi, and small business technology services throughout Coquitlam and Metro Vancouver.
    {{ else if eq .Title "Contact" }}
    Contact Tri-Cities IT Support for small business IT support, Microsoft 365 help, networking, WiFi troubleshooting, and technical assistance in Coquitlam and Metro Vancouver.
    {{ end }}">

    <link rel="icon" type="image/png" href="/images/tc-circle-favicon.png">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        main {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
        }
.highlight-box {
    border-left: 4px solid #d9e6f7;
    padding-left: 18px;
    margin: 20px 0;
    background: #fafcff;
}
header {
    background: #0a2a66;
    color: white;
    padding: 35px 20px;
    text-align: center;
}

.header-card {
    display: inline-block;
}

.site-logo {
    max-width: 360px;
    height: auto;
    background: white;
    padding: 10px 18px;
    border-radius: 4px;
}

.site-nav {
    margin-top: 18px;
    margin-bottom: 18px;
    font-size: 18px;
}

.site-nav a {
    color: #ffffff;
    text-decoration: none;
    font-weight: bold;
    margin: 0 10px;
}

.site-nav a:visited {
    color: #ffffff;
}

.site-nav a:hover {
    color: #dbeafe;
    text-decoration: underline;
}

.site-nav span {
    color: #dbeafe;
}

.service-area {
    font-size: 18px;
    margin: 18px 0 8px 0;
}

.contact-line {
    font-size: 16px;
    margin: 6px 0;
}
.hero-image {
    text-align: center;
    margin: 20px 0;
}

.hero-image img {
    width: 95%;
    max-width: 900px;
    height: auto;
    border-radius: 30px;
}

.about-image {
    text-align: center;
    margin: 20px 0;
}

.about-image img {
    width: 75%;
    max-width: 700px;
    height: auto;
    border-radius: 20px;
}
        a {
            color: #0a2a66;
        }
      form {
    margin-top: 20px;
    padding: 20px;
    background: #fafcff;
    border-left: 4px solid #d9e6f7;
    border-radius: 6px;
}

form label {
    font-weight: bold;
    display: block;
    margin-bottom: 6px;
}

form input,
form textarea {
    width: 100%;
    max-width: 100%;
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    font-size: 16px;
    box-sizing: border-box;
}

form button {
    background: #0a2a66;
    color: white;
    border: none;
    padding: 11px 18px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}

form button:hover {
    background: #123b85;
}  
    </style>
</head>
<body>

<header>
    <div class="header-card">

        <a href="/">
            <img src="/images/tricities-it-support-logo.png"
                 alt="Tri-Cities IT Support"
                 class="site-logo">
        </a>

        <nav class="site-nav">
            <a href="/about/">About</a>
            <span>|</span>
            <a href="/contact/">Contact</a>
        </nav>

        <p class="service-area">Tri-Cities & Metro Vancouver</p>

        <p class="contact-line">
            📞 604-537-1600
        </p>

        <p class="contact-line">
            ✉️ contact@tricitiesitsupport.ca
        </p>

    </div>
</header>

<main>
    {{ .Content }}
</main>

</body>
</html>
